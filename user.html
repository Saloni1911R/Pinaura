<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinaura • My Gallery</title>

<meta name="description" content="Manage your pins on Pinaura">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="no-scroll">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg glassy-nav fixed-top">
<div class="container">

<a class="navbar-brand fw-bold text-indigo" href="index.html">
🌸 Pinaura
</a>

<div class="dropdown ms-auto">

<button class="btn btn-light rounded-pill dropdown-toggle" data-bs-toggle="dropdown">
<i class="bi bi-person-circle"></i>
<span id="userName">User</span>
</button>

<ul class="dropdown-menu dropdown-menu-end shadow">
<li><a class="dropdown-item" href="#">My Pins</a></li>
<li><a class="dropdown-item" href="#">Saved</a></li>
<li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
<li><hr class="dropdown-divider"></li>
<li><button class="dropdown-item text-danger" id="logoutBtn">Logout</button></li>
</ul>

</div>
</div>
</nav>

<!-- Main -->
<main class="container py-5 mt-5 text-center">

<h2 class="fw-bold text-gradient mb-4">My Pins 🎨</h2>

<div id="userPins" class="pin-container"></div>

</main>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content p-3 rounded-4">

<div class="modal-header border-0">
<h5 class="modal-title text-gradient fw-bold">Upload New Pin</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form id="uploadForm">

<input
type="text"
id="pinTitle"
class="form-control mb-3 rounded-pill"
placeholder="Pin Title"
required>

<select id="pinCategory" class="form-select mb-3 rounded-pill">

<option>Art</option>
<option>Travel</option>
<option>Food</option>
<option>Photography</option>
<option>Fashion</option>
<option>Technology</option>
<option>Fitness</option>
<option>DIY</option>

</select>

<input
type="file"
id="pinImage"
class="form-control mb-3 rounded-pill"
accept="image/*"
required>

<img id="previewImage" class="img-fluid mb-3 d-none rounded">

<button type="submit" class="btn pastel-btn w-100 rounded-pill">
Add Pin
</button>

</form>

</div>
</div>
</div>
</div>

<!-- Floating Button -->
<button
class="btn pastel-btn rounded-circle p-3 position-fixed bottom-0 end-0 m-4 shadow"
data-bs-toggle="modal"
data-bs-target="#uploadModal">

<i class="bi bi-plus-lg"></i>

</button>

<!-- Cat -->
<div class="cat-helper">
<img src="assets/img/cat.png" alt="Paws the cat">
</div>

<div class="cat-bubble">
Click + to add a new Pin 🐾
</div>

<!-- Footer -->
<footer class="footer text-center py-3 mt-5">
<p class="mb-0">© <span id="year"></span> Pinaura</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

document.getElementById("year").textContent = new Date().getFullYear();

const user = JSON.parse(localStorage.getItem("pinauraUser")) || {};
document.getElementById("userName").textContent = user.name || "User";

const userPins = document.getElementById("userPins");
const uploadForm = document.getElementById("uploadForm");
const pinImage = document.getElementById("pinImage");
const previewImage = document.getElementById("previewImage");

let pins = JSON.parse(localStorage.getItem("pinauraPins")) || [];

// Render Pins
function renderPins() {
userPins.innerHTML = "";

if (pins.length === 0) {
userPins.innerHTML = `<p class="text-muted">No pins yet. Upload your first pin ✨</p>`;
return;
}

pins.forEach((pin, index) => {
userPins.innerHTML += `
<div class="pin">
<img src="${pin.image}" alt="${pin.title}">
<div class="overlay">${pin.title}</div>
<button class="btn btn-sm btn-danger delete-pin" data-index="${index}">
<i class="bi bi-trash"></i>
</button>
</div>
`;
});

document.querySelectorAll(".delete-pin").forEach(btn => {
btn.addEventListener("click", () => {
const index = btn.dataset.index;
pins.splice(index, 1);
localStorage.setItem("pinauraPins", JSON.stringify(pins));
renderPins();
});
});
}

renderPins();

// Preview Image
pinImage.addEventListener("change", () => {
const file = pinImage.files[0];
if (!file) return;

const reader = new FileReader();

reader.onload = e => {
previewImage.src = e.target.result;
previewImage.classList.remove("d-none");
};

reader.readAsDataURL(file);
});

// Upload Pin
uploadForm.addEventListener("submit", e => {
e.preventDefault();

const title = document.getElementById("pinTitle").value.trim();
const category = document.getElementById("pinCategory").value;
const file = pinImage.files[0];

if (!title || !file) return;

const reader = new FileReader();

reader.onload = e => {
pins.unshift({
title,
category,
image: e.target.result
});

localStorage.setItem("pinauraPins", JSON.stringify(pins));

renderPins();
uploadForm.reset();
previewImage.classList.add("d-none");

bootstrap.Modal.getInstance(document.getElementById("uploadModal")).hide();
};

reader.readAsDataURL(file);
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", () => {
localStorage.removeItem("pinauraUser");
window.location.href = "login.html";
});

});
</script>

</body>
</html>
