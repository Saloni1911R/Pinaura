<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinaura • Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="no-scroll">

  <nav class="navbar navbar-expand-lg glassy-nav fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-indigo" href="index.html">🌸 Pinaura</a>
      <div class="ms-auto">
        <span class="btn btn-light rounded-pill disabled">Login First</span>
      </div>
    </div>
  </nav>

  <main class="login-section d-flex align-items-center justify-content-center vh-100">
    <div class="login-card text-center p-4 rounded-4 shadow-lg">
      <h2 class="fw-bold text-gradient mb-3">Welcome to Pinaura!</h2>
      <p class="text-muted small mb-4">Sign in to continue your creative journey 🌈</p>

      <form class="text-start">
        <div class="mb-3">
          <label class="form-label fw-semibold">Display Name</label>
          <input type="text" class="form-control rounded-pill" placeholder="Your name" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control rounded-pill" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Choose Interests</label>
          <div class="d-flex flex-wrap gap-2 justify-content-center">
            <button type="button" class="btn btn-sm interest-btn">🎨 Art</button>
            <button type="button" class="btn btn-sm interest-btn">✈️ Travel</button>
            <button type="button" class="btn btn-sm interest-btn">🍳 Food</button>
            <button type="button" class="btn btn-sm interest-btn">📷 Photography</button>
            <button type="button" class="btn btn-sm interest-btn">👗 Fashion</button>
            <button type="button" class="btn btn-sm interest-btn">🧠 Tech</button>
            <button type="button" class="btn btn-sm interest-btn">💪 Fitness</button>
            <button type="button" class="btn btn-sm interest-btn">🧩 DIY</button>
          </div>
        </div>

        <div class="text-center mt-4">
          <a href="home.html" class="btn btn-lg pastel-btn rounded-pill px-4">Continue →</a>
        </div>
      </form>

      <div class="small text-muted mt-4">
        New user? Just fill in and click continue — it’s that easy 💫
      </div>
    </div>
  </main>

  <div class="cat-helper">
    <img src="assets/img/cat.png" alt="Pinaura Cat" />
  </div>

  <div class="cat-bubble">Meow! Don’t forget your interests 🐾</div>

  <footer class="footer text-center mt-5">
    <p class="mb-0">© <span id="year"></span> Pinaura</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
